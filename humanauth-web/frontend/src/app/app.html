<style>
  :host {
    font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
      Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
    box-sizing: border-box;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;

    /* Theme tokens */
    --bg0: #070a12;
    --bg1: #0b1020;
    --card: rgba(255, 255, 255, 0.06);
    --card2: rgba(255, 255, 255, 0.10);
    --stroke: rgba(255, 255, 255, 0.12);
    --text: rgba(255, 255, 255, 0.92);
    --muted: rgba(255, 255, 255, 0.68);
    --muted2: rgba(255, 255, 255, 0.52);
    --shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
    --shadow2: 0 10px 30px rgba(0, 0, 0, 0.35);
    --radius-xl: 22px;
    --radius-lg: 16px;
    --radius-md: 12px;
  }

  /* Full-page background (works well inside Angular root) */
  .page {
    min-height: 100vh;
    background:
      radial-gradient(1100px 600px at 20% 10%, rgba(114, 184, 255, 0.28), transparent 60%),
      radial-gradient(900px 600px at 85% 20%, rgba(255, 140, 223, 0.22), transparent 55%),
      radial-gradient(1100px 650px at 60% 90%, rgba(108, 255, 214, 0.18), transparent 60%),
      linear-gradient(180deg, var(--bg0), var(--bg1));
    padding: clamp(18px, 2vw, 28px);
    display: flex;
    justify-content: center;
  }

  .app-container {
    width: 100%;
    max-width: 1160px;
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
    align-items: start;
  }

  /* Hero header */
  header.hero {
    position: relative;
    overflow: hidden;
    border-radius: var(--radius-xl);
    background: linear-gradient(
      135deg,
      rgba(255, 255, 255, 0.10),
      rgba(255, 255, 255, 0.04)
    );
    border: 1px solid var(--stroke);
    box-shadow: var(--shadow);
    padding: clamp(20px, 4vw, 34px);
    isolation: isolate;
  }

  /* Decorative grid + glow */
  header.hero::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(500px 220px at 20% 20%, rgba(114, 184, 255, 0.35), transparent 60%),
      radial-gradient(520px 240px at 85% 30%, rgba(255, 140, 223, 0.28), transparent 60%),
      linear-gradient(to right, rgba(255,255,255,0.06) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.06) 1px, transparent 1px);
    background-size: auto, auto, 42px 42px, 42px 42px;
    opacity: 0.75;
    transform: translate3d(0,0,0);
    pointer-events: none;
    z-index: -1;
  }

  header.hero::after {
    content: "";
    position: absolute;
    inset: -2px;
    border-radius: calc(var(--radius-xl) + 2px);
    background: linear-gradient(
      135deg,
      rgba(114, 184, 255, 0.22),
      rgba(255, 140, 223, 0.18),
      rgba(108, 255, 214, 0.14)
    );
    filter: blur(24px);
    opacity: 0.35;
    z-index: -2;
  }

  .hero-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    margin-bottom: 14px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
  }

  .logo {
    width: 42px;
    height: 42px;
    border-radius: 14px;
    background: linear-gradient(135deg, rgba(114, 184, 255, 0.9), rgba(255, 140, 223, 0.9));
    box-shadow: 0 14px 30px rgba(0,0,0,0.35);
    border: 1px solid rgba(255,255,255,0.25);
    position: relative;
    flex: 0 0 auto;
  }

  .logo::before {
    content: "";
    position: absolute;
    inset: 10px;
    border-radius: 10px;
    background: rgba(255,255,255,0.28);
    filter: blur(0.2px);
  }

  h1 {
    margin: 0;
    color: var(--text);
    font-size: clamp(1.6rem, 2.2vw, 2.25rem);
    letter-spacing: -0.02em;
    line-height: 1.1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .subhead {
    margin: 6px 0 0;
    color: var(--muted);
    max-width: 72ch;
    font-size: clamp(0.95rem, 1.1vw, 1.05rem);
    line-height: 1.55;
  }

  .pill-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 16px;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 999px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    color: var(--muted);
    font-size: 0.9rem;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  .dot {
    width: 9px;
    height: 9px;
    border-radius: 999px;
    background: rgba(108, 255, 214, 0.9);
    box-shadow: 0 0 0 4px rgba(108, 255, 214, 0.12);
  }

  .status {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 14px;
    background: rgba(0,0,0,0.28);
    border: 1px solid rgba(255,255,255,0.10);
    color: var(--muted);
    font-size: 0.92rem;
    box-shadow: var(--shadow2);
    white-space: nowrap;
  }

  .status .kpi {
    color: var(--text);
    font-weight: 650;
    letter-spacing: 0.01em;
  }

  /* Routed content shell */
  .content-shell {
    border-radius: var(--radius-xl);
    background: linear-gradient(
      180deg,
      rgba(255,255,255,0.07),
      rgba(255,255,255,0.04)
    );
    border: 1px solid var(--stroke);
    box-shadow: var(--shadow2);
    padding: clamp(14px, 2vw, 22px);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    overflow: hidden;
  }

  .content-shell-inner {
    border-radius: var(--radius-lg);
    background: rgba(0, 0, 0, 0.20);
    border: 1px solid rgba(255,255,255,0.08);
    padding: clamp(12px, 1.8vw, 18px);
    min-height: 220px;
  }

  /* Small footer hint (optional) */
  .footer-hint {
    text-align: center;
    color: var(--muted2);
    font-size: 0.9rem;
    margin-top: 6px;
  }

  /* Motion */
  @keyframes riseIn {
    from { transform: translateY(10px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }

  header.hero,
  .content-shell {
    animation: riseIn 420ms ease-out both;
  }

  /* Responsive tweaks */
  @media (max-width: 640px) {
    .hero-top {
      flex-direction: column;
      align-items: flex-start;
    }
    .status {
      width: 100%;
      justify-content: space-between;
    }
  }

  /* Accessibility: reduced motion */
  @media (prefers-reduced-motion: reduce) {
    header.hero,
    .content-shell {
      animation: none;
    }
  }
</style>

<div class="page">
  <div class="app-container">
    <header class="hero">
      <div class="hero-top">
        <div class="brand">
          <div class="logo" aria-hidden="true"></div>
          <div>
            <h1>HumanAuth Web</h1>
            <p class="subhead">
              A web-based human authentication system using face and hand recognition.
              Fast onboarding, clear feedback, and privacy-minded local processing.
            </p>
          </div>
        </div>

        <div class="status" aria-label="System status">
          <span class="dot" aria-hidden="true"></span>
          <span><span class="kpi">Camera</span> ready</span>
        </div>
      </div>

      <div class="pill-row" aria-label="Highlights">
        <span class="pill">Face verification</span>
        <span class="pill">Hand gesture checks</span>
        <span class="pill">Session-based auth</span>
        <span class="pill">Low-latency UI</span>
      </div>
    </header>

    <section class="content-shell">
      <div class="content-shell-inner">
        <router-outlet></router-outlet>
      </div>
      <div class="footer-hint">Tip: Use consistent lighting for best recognition.</div>
    </section>
  </div>
</div>
